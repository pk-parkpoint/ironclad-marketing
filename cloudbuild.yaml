steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args: ['scripts/deploy-production.sh']
    env:
      - 'IRONCLAD_SKIP_GIT_CHECK=1'
      - 'IRONCLAD_PREPARE_ONLY=1'
      - 'IRONCLAD_KEEP_GENERATED_DOTENV=1'

  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'lint']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'analytics:audit']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args: ['scripts/deploy-production.sh']
    env:
      - 'IRONCLAD_SKIP_GIT_CHECK=1'

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'launch:prod:audit']

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
